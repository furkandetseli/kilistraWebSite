<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kilistra Antik Kenti'ndeki Sandıkkaya Kilisesi, Sümbül Kilisesi, Via Sebaste ve daha fazlasını interaktif harita ile keşfedin.">
  <title>Keşfet — Kilistra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    .category-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-lg);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-heading);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--clr-text-muted);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="page-loader">
  <span class="loader-logo">Kilistra</span>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="navbar-placeholder"></div>

<!-- ═══════════════════════════════════════════
     PAGE HERO
════════════════════════════════════════════ -->
<section class="page-hero" id="page-hero">
  <div class="page-hero-bg" id="hero-bg">
    <div style="width:100%;height:100%;background:radial-gradient(ellipse at 60% 50%, rgba(201,168,76,0.2) 0%, var(--clr-bg) 70%);"></div>
  </div>
  <div class="container page-hero-content">
    <div class="breadcrumb">
      <a href="index.html">Ana Sayfa</a>
      <span class="breadcrumb-sep">›</span>
      <span>Keşfet</span>
    </div>
    <span class="page-hero-label">Mekanlar & Harita</span>
    <h1 id="hero-title">Keşfet</h1>
    <p id="hero-subtitle"></p>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     MAP + PLACES
════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div class="kesfet-layout">

      <!-- Places list -->
      <div>
        <div class="section-header" style="text-align:left;margin-bottom:var(--sp-2xl);" data-aos="fade-up">
          <span class="section-label">Kilistra'da Gezilecek Yerler</span>
          <h2>Tüm Mekanlar</h2>
        </div>
        <div class="places-list" id="places-list"></div>
      </div>

      <!-- Sticky map -->
      <div class="map-sticky" data-aos="fade-left">
        <div class="section-header" style="text-align:left;margin-bottom:var(--sp-lg);">
          <span class="section-label">İnteraktif Harita</span>
          <h3>Kilistra Konumları</h3>
        </div>
        <div class="category-legend" id="map-legend"></div>
        <div id="map"></div>
        <div style="margin-top:var(--sp-md);text-align:center;">
          <a
            href="https://maps.google.com/?q=37.6482,32.3869"
            target="_blank"
            rel="noopener"
            class="btn btn-ghost"
            style="font-size:0.75rem;"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Google Maps'te Aç
          </a>
        </div>
      </div>

    </div>
  </div>
</section>

<button id="scroll-top" aria-label="Yukarı çık">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/main.js"></script>
<script src="js/map.js"></script>
<script>
async function pageInit(data) {
  const U = window.KilistraUtils;
  const p = data.places;

  // Hero
  const heroBg = document.getElementById('hero-bg');
  if (p.hero_image) {
    heroBg.innerHTML = `<img data-src="${p.hero_image}" src="${U.placeholderSVG(p.hero_image_alt)}" alt="${p.hero_image_alt}" style="width:100%;height:100%;object-fit:cover;">`;
  }
  document.getElementById('hero-title').textContent    = p.page_title;
  document.getElementById('hero-subtitle').textContent = p.page_subtitle;

  // Category colors for legend
  const categoryColors = {
    'Dini Yapı':     '#C9A84C',
    'Antik Yol':     '#8B5E3C',
    'Savunma Yapısı':'#6B8E6B',
    'Altyapı':       '#5B7FA8',
  };

  // Legend
  const legendHTML = Object.entries(categoryColors).map(([cat, color]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${color};"></div>
      <span>${cat}</span>
    </div>
  `).join('');
  document.getElementById('map-legend').innerHTML = legendHTML;

  // Places list
  const list = document.getElementById('places-list');
  list.innerHTML = p.items.map((place, i) => `
    <div
      class="place-card"
      id="${place.id}"
      data-place-id="${place.id}"
      data-aos="fade-up"
      data-aos-delay="${Math.min(i * 80, 300)}"
    >
      <div class="place-card-image img-placeholder">
        <img
          data-src="${place.image}"
          src="${U.placeholderSVG(place.name)}"
          alt="${place.image_alt}"
          loading="lazy"
        >
      </div>
      <div class="place-card-body">
        <div class="place-card-meta">
          <span class="badge badge-gold">${place.category}</span>
          <span class="badge badge-terra">${place.period}</span>
        </div>
        <h3>${place.name}</h3>
        <p>${place.description}</p>
        ${place.tips ? `
          <div class="place-card-tip">
            <strong>İpucu:</strong> ${place.tips}
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');

  // Init map after DOM ready
  setTimeout(() => {
    if (window.KilistraMap) {
      window.KilistraMap.initExploreMap(p.map, p.items);
    }
  }, 100);

  if (typeof AOS !== 'undefined') AOS.refresh();
}
</script>
</body>
</html>
