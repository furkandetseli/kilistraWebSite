<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kilistra Antik Kenti ve Gökyurt Köyü'nden fotoğraf galerisi. Kaya kiliseleri, arkeoloji ve doğadan büyüleyici kareler.">
  <title>Galeri — Kilistra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div id="page-loader">
  <span class="loader-logo">Kilistra</span>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="navbar-placeholder"></div>

<!-- ═══════════════════════════════════════════
     PAGE HERO
════════════════════════════════════════════ -->
<section class="page-hero" id="page-hero">
  <div class="page-hero-bg" id="hero-bg">
    <div style="width:100%;height:100%;background:radial-gradient(ellipse at 70% 40%, rgba(201,168,76,0.15) 0%, var(--clr-bg) 65%);"></div>
  </div>
  <div class="container page-hero-content">
    <div class="breadcrumb">
      <a href="index.html">Ana Sayfa</a>
      <span class="breadcrumb-sep">›</span>
      <span>Galeri</span>
    </div>
    <span class="page-hero-label">Fotoğraflar</span>
    <h1 id="hero-title">Galeri</h1>
    <p id="hero-subtitle"></p>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     GALLERY
════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div data-aos="fade-up">
      <div id="gallery-filters" class="gallery-filters"></div>
    </div>
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     LIGHTBOX
════════════════════════════════════════════ -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Fotoğraf önizleme">
  <div class="lightbox-inner">
    <button class="lightbox-close" aria-label="Kapat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lightbox-prev" aria-label="Önceki fotoğraf">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-next" aria-label="Sonraki fotoğraf">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="" style="transition:opacity 0.2s ease;">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:var(--sp-md);">
      <p id="lightbox-caption" class="lightbox-caption" style="margin:0;"></p>
      <span id="lightbox-counter" style="font-family:var(--font-heading);font-size:0.75rem;color:var(--clr-text-dim);white-space:nowrap;"></span>
    </div>
  </div>
</div>

<button id="scroll-top" aria-label="Yukarı çık">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="js/main.js"></script>
<script src="js/gallery.js"></script>
<script>
async function pageInit(data) {
  const U = window.KilistraUtils;
  const g = data.gallery;

  // Hero
  const heroBg = document.getElementById('hero-bg');
  if (g.hero_image) {
    heroBg.innerHTML = `<img data-src="${g.hero_image}" src="${U.placeholderSVG(g.hero_image_alt)}" alt="${g.hero_image_alt}" style="width:100%;height:100%;object-fit:cover;">`;
  }
  document.getElementById('hero-title').textContent    = g.page_title;
  document.getElementById('hero-subtitle').textContent = g.page_subtitle;

  // Init gallery with filters
  if (window.KilistraGallery) {
    window.KilistraGallery.initFilters(g.categories, g.items);
    window.KilistraGallery.initGallery(g.items);
  }

  if (typeof AOS !== 'undefined') AOS.refresh();
}
</script>
</body>
</html>
