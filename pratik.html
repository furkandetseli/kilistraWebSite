<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kilistra Antik Kenti ziyaret bilgileri: ulaşım, konaklama, en iyi ziyaret zamanı ve ipuçları.">
  <title>Pratik Bilgiler — Kilistra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div id="page-loader">
  <span class="loader-logo">Kilistra</span>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="navbar-placeholder"></div>

<!-- ═══════════════════════════════════════════
     PAGE HERO
════════════════════════════════════════════ -->
<section class="page-hero" id="page-hero">
  <div class="page-hero-bg" id="hero-bg">
    <div style="width:100%;height:100%;background:radial-gradient(ellipse at 50% 60%, rgba(139,94,60,0.25) 0%, var(--clr-bg) 65%);"></div>
  </div>
  <div class="container page-hero-content">
    <div class="breadcrumb">
      <a href="index.html">Ana Sayfa</a>
      <span class="breadcrumb-sep">›</span>
      <span>Pratik Bilgiler</span>
    </div>
    <span class="page-hero-label">Ziyaret Rehberi</span>
    <h1 id="hero-title">Pratik Bilgiler</h1>
    <p id="hero-subtitle"></p>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     VISIT INFO
════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label" id="visit-label">Ziyaret Bilgileri</span>
      <h2 id="visit-title">Ziyaret Saatleri & Koşullar</h2>
    </div>
    <div class="visit-info-grid" id="visit-info-grid"></div>

    <!-- Alert box -->
    <div
      data-aos="fade-up"
      style="
        background: rgba(201,168,76,0.06);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: var(--radius-lg);
        padding: var(--sp-xl);
        display: flex;
        gap: var(--sp-md);
        align-items: flex-start;
      "
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" flex-shrink="0" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p id="visit-notes" style="color:var(--clr-stone-muted);font-size:0.92rem;max-width:none;"></p>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     TRANSPORTATION
════════════════════════════════════════════ -->
<section class="section section-alt">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">Ulaşım</span>
      <h2 id="transport-title">Nasıl Gidilir?</h2>
      <p id="transport-from"></p>
    </div>

    <div class="routes-grid" id="routes-grid"></div>

    <div
      data-aos="fade-up"
      style="
        background: var(--clr-surface-2);
        border: 1px solid var(--clr-border-soft);
        border-radius: var(--radius-lg);
        padding: var(--sp-xl);
        margin-top: var(--sp-xl);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--sp-xl);
      "
      class="transport-extra"
    >
      <div>
        <h4 style="margin-bottom:var(--sp-sm);font-size:0.95rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--clr-gold)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Araç Kiralama
        </h4>
        <p id="car-rental" style="font-size:0.88rem;color:var(--clr-text-muted);"></p>
      </div>
      <div>
        <h4 style="margin-bottom:var(--sp-sm);font-size:0.95rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--clr-gold)" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Toplu Taşıma
        </h4>
        <p id="public-transport" style="font-size:0.88rem;color:var(--clr-text-muted);"></p>
      </div>
    </div>

    <div style="text-align:center;margin-top:var(--sp-2xl);" data-aos="fade-up">
      <a
        href="https://maps.google.com/?q=37.6482,32.3869"
        target="_blank"
        rel="noopener"
        class="btn btn-primary"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Google Maps'te Yol Tarifi Al
      </a>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     ACCOMMODATION
════════════════════════════════════════════ -->
<section class="section">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">Konaklama</span>
      <h2 id="acc-title">Nerede Konaklarsınız?</h2>
      <p id="acc-recommendation"></p>
    </div>
    <div class="grid-2" id="acc-grid"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     TIPS
════════════════════════════════════════════ -->
<section class="section section-alt">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">Tavsiyeler</span>
      <h2 id="tips-title">Ziyaretçi İpuçları</h2>
    </div>
    <div class="tips-grid" id="tips-grid"></div>
  </div>
</section>

<button id="scroll-top" aria-label="Yukarı çık">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="js/main.js"></script>
<script>
async function pageInit(data) {
  const U = window.KilistraUtils;
  const pr = data.practical;

  // Hero
  const heroBg = document.getElementById('hero-bg');
  if (pr.hero_image) {
    heroBg.innerHTML = `<img data-src="${pr.hero_image}" src="${U.placeholderSVG(pr.hero_image_alt)}" alt="${pr.hero_image_alt}" style="width:100%;height:100%;object-fit:cover;">`;
  }
  document.getElementById('hero-title').textContent    = pr.page_title;
  document.getElementById('hero-subtitle').textContent = pr.page_subtitle;

  // Visit info
  const visitItems = [
    { icon: 'clock',    title: 'Ziyaret Saatleri',  text: pr.visit_info.hours },
    { icon: 'star',     title: 'Giriş Ücreti',       text: pr.visit_info.entrance },
    { icon: 'calendar', title: 'Önerilen Süre',      text: pr.visit_info.duration },
    { icon: 'sun',      title: 'En İyi Mevsim',      text: pr.visit_info.best_season },
  ];

  document.getElementById('visit-info-grid').innerHTML = visitItems.map((item, i) => `
    <div class="visit-info-item" data-aos="fade-up" data-aos-delay="${i * 80}">
      <div class="visit-info-icon">${U.svgIcon(item.icon, 18)}</div>
      <div>
        <h4>${item.title}</h4>
        <p>${item.text}</p>
      </div>
    </div>
  `).join('');

  document.getElementById('visit-notes').textContent = pr.visit_info.notes;

  // Transportation
  document.getElementById('transport-title').textContent = pr.transportation.title;
  document.getElementById('transport-from').textContent  = pr.transportation.from_konya;
  document.getElementById('car-rental').textContent     = pr.transportation.car_rental;
  document.getElementById('public-transport').textContent = pr.transportation.public_transport;

  document.getElementById('routes-grid').innerHTML = pr.transportation.routes.map((r, i) => `
    <div class="route-card" data-aos="fade-up" data-aos-delay="${i * 100}">
      <div class="route-num">0${i + 1}</div>
      <div>
        <h4>${r.title}</h4>
        <p>${r.description}</p>
        <div class="route-duration">
          ${U.svgIcon('clock', 13)}
          ${r.duration}
        </div>
      </div>
    </div>
  `).join('');

  // Accommodation
  document.getElementById('acc-title').textContent          = pr.accommodation.title;
  document.getElementById('acc-recommendation').textContent = pr.accommodation.recommendation;

  document.getElementById('acc-grid').innerHTML = pr.accommodation.items.map((acc, i) => `
    <div class="feature-card" data-aos="fade-up" data-aos-delay="${i * 100}">
      <div class="feature-card-image img-placeholder">
        <img data-src="${acc.image}" src="${U.placeholderSVG(acc.image_alt)}" alt="${acc.image_alt}" loading="lazy">
      </div>
      <div class="feature-card-body">
        <h3>${acc.area}</h3>
        <p>${acc.note}</p>
      </div>
    </div>
  `).join('');

  // Tips
  document.getElementById('tips-title').textContent = pr.tips.title;
  document.getElementById('tips-grid').innerHTML = pr.tips.items.map((tip, i) => `
    <div class="info-card" data-aos="fade-up" data-aos-delay="${i * 80}">
      <div class="info-card-icon">${U.svgIcon(tip.icon, 20)}</div>
      <h4>${tip.title}</h4>
      <p>${tip.text}</p>
    </div>
  `).join('');

  if (typeof AOS !== 'undefined') AOS.refresh();
}
</script>
</body>
</html>
