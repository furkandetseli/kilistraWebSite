<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Konya Meram'daki Kilistra Antik Kenti ve Gökyurt Köyü'nün sanal rehberi. Kaya kiliseleri, Roma tarihi ve Aziz Pavlus'un izleri.">
  <meta property="og:title" content="Kilistra — Gökyurt Köyü Sanal Rehberi">
  <meta property="og:description" content="2000 yıllık tarihin izinde, Anadolu'nun gizli hazinesi Kilistra'yı keşfedin.">
  <meta property="og:type" content="website">
  <title>Kilistra — Gökyurt Köyü Sanal Rehberi</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- Page Loader -->
<div id="page-loader">
  <span class="loader-logo">Kilistra</span>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- Navbar injected by JS -->
<div id="navbar-placeholder"></div>

<!-- ═══════════════════════════════════════════
     HERO
════════════════════════════════════════════ -->
<section class="hero" id="hero">
  <div class="hero-bg">
    <div class="hero-bg-placeholder" id="hero-bg-img"></div>
  </div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <p class="hero-eyebrow" id="hero-eyebrow">Gökyurt Köyü · Meram · Konya</p>
    <h1 class="hero-title display-title" id="hero-title">Kilistra</h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-actions" id="hero-actions"></div>
  </div>

  <div class="hero-scroll">
    <span>Keşfet</span>
    <div class="hero-scroll-line"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     NAVIGATE CARDS
════════════════════════════════════════════ -->
<section class="section section-dark" id="nav-section">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label">Ne Arıyorsunuz?</span>
      <h2>Kilistra'yı Keşfedin</h2>
    </div>
    <div class="nav-cards-grid" id="nav-cards"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     INTRO
════════════════════════════════════════════ -->
<section class="section" id="intro-section">
  <div class="container">
    <div class="intro-grid">
      <div class="intro-image" data-aos="fade-right">
        <div class="intro-image-main img-placeholder" id="intro-img-wrap">
          <!-- image injected by JS -->
        </div>
      </div>
      <div data-aos="fade-left" data-aos-delay="150">
        <span class="intro-label">Kilistra Nedir?</span>
        <h2 id="intro-title"></h2>
        <div class="gold-divider"><span class="gold-divider-icon">✦</span></div>
        <p class="intro-text" id="intro-text"></p>
        <a href="tarih.html" class="btn btn-primary">
          Tarihi Keşfet
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
        <div class="intro-highlights" id="intro-highlights"></div>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     STATS BAND
════════════════════════════════════════════ -->
<div class="stats-band">
  <div class="container">
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     FEATURED PLACES
════════════════════════════════════════════ -->
<section class="section section-alt" id="places-section">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <span class="section-label" id="places-label"></span>
      <h2 id="places-title"></h2>
      <p id="places-subtitle"></p>
    </div>
    <div class="places-carousel" id="places-grid"></div>
    <div style="text-align:center;margin-top:var(--sp-2xl)" data-aos="fade-up">
      <a href="kesfet.html" class="btn btn-outline">
        Tüm Mekanları Gör
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     SCROLL TO TOP
════════════════════════════════════════════ -->
<button id="scroll-top" aria-label="Yukarı çık">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- Footer injected by JS -->
<div id="footer-placeholder"></div>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="js/main.js"></script>
<script>
async function pageInit(data) {
  const U = window.KilistraUtils;

  // Hero
  const heroBg = document.getElementById('hero-bg-img');
  if (data.hero.image) {
    heroBg.style.backgroundImage = `url('${data.hero.image}')`;
    heroBg.style.backgroundSize = 'cover';
    heroBg.style.backgroundPosition = 'center';
  }
  document.getElementById('hero-subtitle').textContent = data.hero.subtitle;
  document.getElementById('hero-desc').textContent    = data.hero.description;

  const actions = document.getElementById('hero-actions');
  actions.innerHTML = `
    <a href="${data.hero.cta_primary.href}" class="btn btn-primary">
      ${data.hero.cta_primary.label}
      ${U.svgIcon('arrow-right', 16)}
    </a>
    <a href="${data.hero.cta_secondary.href}" class="btn btn-outline">
      ${data.hero.cta_secondary.label}
    </a>
  `;

  // Nav cards
  const navDefs = [
    {
      label: 'Tarih & Arkeoloji',
      desc:  'Roma ve Bizans katmanlarını keşfedin',
      href:  'tarih.html',
      icon:  'layers',
      imgKey: 'tarih-hero.jpg',
    },
    {
      label: 'Mekanları Keşfet',
      desc:  'Kaya kiliseleri, sarnıçlar ve antik yollar',
      href:  'kesfet.html',
      icon:  'map-pin',
      imgKey: 'kesfet-hero.jpg',
    },
    {
      label: 'Galeri',
      desc:  'Kilistra\'dan muhteşem kareler',
      href:  'galeri.html',
      icon:  'star',
      imgKey: 'galeri-hero.jpg',
    },
  ];

  document.getElementById('nav-cards').innerHTML = navDefs.map(c => `
    <a href="${c.href}" class="nav-card" data-aos="fade-up" data-aos-delay="${navDefs.indexOf(c) * 100}">
      <div class="nav-card-bg">
        <img data-src="assets/images/${c.imgKey}" src="${U.placeholderSVG(c.label)}" alt="${c.label}" loading="lazy">
      </div>
      <div class="nav-card-content">
        <div class="nav-card-icon">${U.svgIcon(c.icon, 24)}</div>
        <h3>${c.label}</h3>
        <p>${c.desc}</p>
        <div class="nav-card-arrow">${U.svgIcon('arrow-right', 16)}</div>
      </div>
    </a>
  `).join('');

  // Intro
  document.getElementById('intro-title').textContent = data.intro.title;
  document.getElementById('intro-text').textContent  = data.intro.text;

  const introImgWrap = document.getElementById('intro-img-wrap');
  introImgWrap.innerHTML = `<img data-src="${data.intro.image}" src="${U.placeholderSVG(data.intro.image_alt)}" alt="${data.intro.image_alt}" style="width:100%;height:100%;object-fit:cover;">`;

  // Highlights
  const iconMap = { calendar: 'calendar', church: 'church', 'map-pin': 'map-pin', layers: 'layers' };
  document.getElementById('intro-highlights').innerHTML = data.intro.highlights.map(h => `
    <div class="highlight-item" data-aos="fade-up">
      <div class="highlight-icon">${U.svgIcon(iconMap[h.icon] || 'star', 18)}</div>
      <div>
        <div class="highlight-value">${h.value}</div>
        <div class="highlight-label">${h.label}</div>
      </div>
    </div>
  `).join('');

  // Stats
  document.getElementById('stats-grid').innerHTML = data.stats.map((s, i) => `
    <div class="stat-item" data-aos="fade-up" data-aos-delay="${i * 80}">
      <span class="stat-value" data-counter="${s.value}">${s.value}</span>
      <span class="stat-label">${s.label}</span>
    </div>
  `).join('');

  // Featured places label/title
  document.getElementById('places-label').textContent    = data.featured_places.title;
  document.getElementById('places-title').textContent    = data.featured_places.subtitle;

  // Places grid
  document.getElementById('places-grid').innerHTML = data.featured_places.items.map((p, i) => `
    <div class="feature-card" data-aos="fade-up" data-aos-delay="${i * 80}">
      <div class="feature-card-image">
        <img data-src="${p.image}" src="${U.placeholderSVG(p.name)}" alt="${p.image_alt}" loading="lazy">
      </div>
      <div class="feature-card-body">
        <h3>${p.name}</h3>
        <p>${p.short_desc}</p>
      </div>
      <div class="feature-card-footer">
        <a href="${p.href}" class="feature-card-link">
          Detaylar ${U.svgIcon('arrow-right', 14)}
        </a>
      </div>
    </div>
  `).join('');

  // Re-init AOS for dynamically added elements
  if (typeof AOS !== 'undefined') AOS.refresh();
}
</script>
</body>
</html>
